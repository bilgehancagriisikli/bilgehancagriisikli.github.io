<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Programlama — Kod Atölyesi</title>
  <script>
    /* Temayı, sayfa boyanmadan önce ayarla (yanıp sönmeyi önler) */
    (function () {
      try {
        var t = localStorage.getItem("wp-theme");
        if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <style>
/* =====================================================================
   Web Programlama — Kod Atölyesi · tema
   Yapısal renk sistemi: her dilin kendi rengi vardır (anlam taşır).
===================================================================== */
:root {
  --bg: #eef1f6;
  --nav: #0f1b30;
  --nav-soft: #1b2b47;
  --card: #ffffff;
  --code-bg: #0f1f33;
  --ink: #1f2733;
  --muted: #64748b;
  --line: #dde3ec;
  --primary: #3b5bdb;
  --primary-dark: #1c3aa9;

  --html: #e34c26;
  --css: #2965f1;
  --js: #d99413;
  --php: #8b5cf6;
  --kavram: #0d9488;

  --mono: ui-monospace, "DejaVu Sans Mono", "SF Mono", Menlo, Consolas, monospace;
  --sans: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: var(--sans); font-size: 15px; line-height: 1.55;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ---------------- top bar ---------------- */
.topbar {
  background: var(--nav); color: #fff; flex: 0 0 auto;
  display: flex; align-items: center; gap: 18px;
  padding: 12px 20px; border-bottom: 3px solid var(--primary);
}
.brand { display: flex; flex-direction: column; line-height: 1.15; margin-right: 6px; }
.brand .row { display: flex; align-items: baseline; gap: 8px; }
#app-title { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
#app-sub {
  font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: #8fb4ff; background: rgba(59,91,219,.18); padding: 2px 8px; border-radius: 5px;
}

.search-wrap { margin-left: auto; position: relative; }
#search {
  width: 240px; max-width: 42vw; background: #0a1422; color: #eaf0fb;
  border: 1px solid #2b3c5c; border-radius: 8px; padding: 8px 12px 8px 30px; font-size: 13px;
  font-family: var(--sans);
}
#search::placeholder { color: #7488a8; }
#search:focus { outline: 2px solid var(--primary); border-color: transparent; }
.search-wrap::before {
  content: "⌕"; position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: #7488a8; font-size: 15px;
}

.chips { display: flex; gap: 6px; }
.chip {
  font-family: var(--sans); font-size: 12px; font-weight: 600; cursor: pointer;
  background: transparent; color: #c7d3e8; border: 1px solid #2b3c5c;
  padding: 6px 11px; border-radius: 20px; transition: all .15s ease;
}
.chip:hover { border-color: #4a5f86; color: #fff; }
.chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.chip.lang-pill-html.active { background: var(--html); border-color: var(--html); }
.chip.lang-pill-css.active  { background: var(--css);  border-color: var(--css); }
.chip.lang-pill-js.active   { background: var(--js);   border-color: var(--js); }
.chip.lang-pill-php.active  { background: var(--php);  border-color: var(--php); }

/* ---------------- layout ---------------- */
.shell { flex: 1 1 auto; display: flex; min-height: 0; }

.sidebar {
  flex: 0 0 268px; background: var(--nav); color: #cdd9ec;
  overflow-y: auto; padding: 14px 10px 30px;
}
.side-title {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: #7488a8; padding: 6px 10px 10px; font-weight: 700;
}
.side-item {
  width: 100%; text-align: left; display: flex; align-items: center; gap: 10px;
  background: transparent; border: 0; color: inherit; cursor: pointer;
  padding: 9px 10px; border-radius: 9px; font-family: var(--sans); margin-bottom: 2px;
  transition: background .12s ease;
}
.side-item:hover { background: var(--nav-soft); }
.side-item.active { background: var(--primary); color: #fff; }
.side-num {
  font-family: var(--mono); font-size: 16px; font-weight: 700; opacity: .55;
  flex: 0 0 26px; text-align: center;
}
.side-item.active .side-num { opacity: 1; }
.side-text { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.side-name { font-size: 13.5px; font-weight: 600; }
.side-dots { display: flex; gap: 4px; }
.dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.dot.lang-html { background: var(--html); }
.dot.lang-css  { background: var(--css); }
.dot.lang-js   { background: var(--js); }
.dot.lang-php  { background: var(--php); }
.dot.lang-kavram { background: var(--kavram); }

.main {
  flex: 1 1 auto; overflow-y: auto; padding: 26px 32px 60px; min-width: 0;
}

/* ---------------- week head ---------------- */
.week-head-block { margin-bottom: 18px; max-width: 940px; }
.week-eyebrow {
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--primary); margin-bottom: 4px;
}
.week-head-block.added .week-eyebrow { color: var(--html); }
.week-head-block h2 { margin: 0 0 4px; font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
.week-sum { margin: 0; color: var(--muted); font-size: 15px; }

.badge-added {
  display: inline-block; background: #fde68a; color: #7c2d12; font-size: 10px;
  font-weight: 800; padding: 2px 7px; border-radius: 10px; margin-left: 8px;
  letter-spacing: .5px; vertical-align: middle;
}
.note-banner {
  max-width: 940px; background: #fff7ed; border: 1px solid #fdba74; border-left: 5px solid var(--html);
  color: #7c2d12; padding: 10px 14px; border-radius: 8px; margin-bottom: 18px; font-size: 13.5px;
}
.result-week {
  max-width: 940px; font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px;
}
.empty { color: var(--muted); }

/* ---------------- card ---------------- */
.card {
  background: var(--card); border: 1px solid var(--line); border-radius: 14px;
  padding: 16px 18px; margin-bottom: 16px; max-width: 940px;
  box-shadow: 0 1px 2px rgba(15,27,48,.04);
}
.card-head { display: flex; align-items: center; gap: 10px; }
.card-name { margin: 0; font-size: 17px; font-weight: 700; flex: 1 1 auto; }
.lang-badge {
  font-size: 11px; font-weight: 800; letter-spacing: .4px; color: #fff;
  padding: 3px 9px; border-radius: 6px; flex: 0 0 auto;
}
.lang-badge.lang-html { background: var(--html); }
.lang-badge.lang-css  { background: var(--css); }
.lang-badge.lang-js   { background: var(--js); }
.lang-badge.lang-php  { background: var(--php); }
.lang-badge.lang-kavram { background: var(--kavram); }
.card-note { margin: 8px 0 12px; color: #46566c; font-size: 14px; }

/* ---------------- code block ---------------- */
.code-wrap { position: relative; margin: 8px 0; }
.code-lang {
  position: absolute; top: 0; left: 0; font-family: var(--mono); font-size: 10px; font-weight: 700;
  color: #fff; padding: 3px 8px; border-radius: 9px 0 9px 0; letter-spacing: .5px; z-index: 2;
}
.code-lang.lang-html { background: var(--html); }
.code-lang.lang-css  { background: var(--css); }
.code-lang.lang-js   { background: var(--js); }
.code-lang.lang-php  { background: var(--php); }
.code-copy {
  position: absolute; top: 5px; right: 8px; z-index: 2;
  background: rgba(255,255,255,.08); color: #aebfdb; border: 1px solid #2c3e5e;
  font-family: var(--sans); font-size: 11px; padding: 3px 9px; border-radius: 6px; cursor: pointer;
}
.code-copy:hover { color: #fff; border-color: #4a5f86; }
pre.code {
  margin: 0; background: var(--code-bg); color: #dbe4f1; border-radius: 9px;
  padding: 26px 14px 14px; overflow-x: auto; font-family: var(--mono);
  font-size: 12.8px; line-height: 1.6; tab-size: 2;
}
pre.code code { font-family: inherit; }

/* token colors */
.c-com  { color: #6b829e; font-style: italic; }
.c-str  { color: #9ece6a; }
.c-kw   { color: #7aa2f7; font-weight: 600; }
.c-num  { color: #e0954e; }
.c-var  { color: #56cfe1; }
.c-tag  { color: #f7768e; }
.c-attr { color: #e0af68; }
.c-prop { color: #56cfe1; }
.c-punc { color: #8a9bb8; }

/* ---------------- actions + stage ---------------- */
.card-actions { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn {
  font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer;
  border-radius: 8px; padding: 8px 16px; border: 1px solid transparent; transition: all .15s ease;
}
.btn-run { background: var(--primary); color: #fff; }
.btn-run:hover { background: var(--primary-dark); }
.btn-ghost { background: #fff; color: var(--primary); border-color: var(--primary); }
.btn-ghost:hover { background: #eef2ff; }
.server-note { font-size: 12.5px; color: var(--php); font-weight: 600; }

.stage { margin-top: 12px; }
.stage:empty { margin-top: 0; }

.preview-bar {
  background: #11203a; color: #9fb4d8; font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 6px 12px; border-radius: 9px 9px 0 0;
}
.preview {
  width: 100%; min-height: 90px; height: 190px; border: 1px solid #11203a; border-top: 0;
  background: #fff; border-radius: 0 0 9px 9px; display: block;
}
.console {
  background: #0a1422; color: #cdd9ec; font-family: var(--mono); font-size: 12px;
  padding: 8px 12px; border-radius: 0 0 9px 9px; margin-top: -3px; max-height: 150px; overflow-y: auto;
  border: 1px solid #11203a; border-top: 1px dashed #2c3e5e;
}
.c-line { white-space: pre-wrap; padding: 1px 0; }
.c-line.c-error, .c-line.c-alert { color: #f7a072; }
.c-line.c-warn { color: #e0af68; }

.expected {
  background: #f6f9fd; border: 1px solid var(--line); border-radius: 9px; overflow: hidden;
}
.expected-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--php); background: #f3eeff; padding: 6px 12px; border-bottom: 1px solid #e7dcff;
}
.expected pre {
  margin: 0; padding: 10px 12px; font-family: var(--mono); font-size: 12.5px;
  white-space: pre-wrap; color: #2a3850;
}

/* editor */
.editor {
  width: 100%; background: var(--code-bg); color: #e6edf6; border: 1px solid #2c3e5e;
  border-radius: 9px; padding: 12px 14px; font-family: var(--mono); font-size: 12.6px;
  line-height: 1.55; resize: vertical; tab-size: 2;
}
.editor:focus { outline: 2px solid var(--primary); }
.editor-row { margin: 8px 0; }
.stage-inner { margin-top: 4px; }

/* ---------------- responsive ---------------- */
@media (max-width: 820px) {
  .shell { flex-direction: column; }
  .sidebar {
    flex: 0 0 auto; max-height: 132px; display: flex; flex-wrap: nowrap; overflow-x: auto;
    gap: 6px; padding: 10px;
  }
  .side-title { display: none; }
  .side-item { flex: 0 0 auto; width: auto; }
  .side-text { white-space: nowrap; }
  .main { padding: 18px 16px 50px; }
  .topbar { flex-wrap: wrap; gap: 10px; }
  .search-wrap { order: 3; width: 100%; }
  #search { width: 100%; max-width: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}

/* ---------------- dark mode ---------------- */
:root[data-theme="dark"] {
  --bg: #0b1322;
  --card: #111d31;
  --ink: #e6edf6;
  --muted: #8da3c0;
  --line: #22324d;
}
[data-theme="dark"] .card { box-shadow: none; }
[data-theme="dark"] .card-note { color: #aebccf; }
[data-theme="dark"] .note-banner {
  background: rgba(227,76,38,.12); color: #fca982; border-color: rgba(227,76,38,.35);
}
[data-theme="dark"] .expected { background: #0e1a2c; }
[data-theme="dark"] .expected pre { color: #cdd9ec; }
[data-theme="dark"] .expected-label {
  background: rgba(139,92,246,.16); color: #c4b5fd; border-bottom-color: rgba(139,92,246,.3);
}
[data-theme="dark"] .btn-ghost { background: #16243c; }
[data-theme="dark"] .btn-ghost:hover { background: #1d2f4d; }

/* theme toggle button */
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid #2b3c5c;
  background: transparent; color: #c7d3e8; cursor: pointer; font-size: 15px; line-height: 1;
  display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
  transition: all .15s ease;
}
.icon-btn:hover { border-color: #4a5f86; color: #fff; }

/* içerik uyarısı (disclaimer) */
.disclaimer {
  margin: 14px 0 0; display: flex; align-items: center; gap: 9px;
  font-size: 14.5px; font-weight: 600; font-style: normal; color: #92400e;
  background: #fef3c7; border: 1px solid #fbbf24; border-left: 6px solid #f59e0b;
  padding: 11px 15px; border-radius: 9px;
}
.disclaimer::before { content: "⚠"; font-size: 19px; line-height: 1; flex: 0 0 auto; }
[data-theme="dark"] .disclaimer {
  background: rgba(245,158,11,.14); color: #fcd34d; border-color: rgba(245,158,11,.45);
}

/* araştırma ödevi rozeti */
.badge-research {
  display: inline-block; background: var(--kavram); color: #fff; font-size: 9.5px;
  font-weight: 800; letter-spacing: .5px; padding: 2px 7px; border-radius: 10px;
  margin-left: 8px; vertical-align: middle;
}
/* terim listesi (kavram kartları) */
.term-list { margin: 10px 0 0; }
.term-list dt { font-weight: 700; color: var(--ink); margin-top: 9px; font-size: 14px; }
.term-list dd { margin: 2px 0 0; color: var(--muted); font-size: 13.5px; line-height: 1.5; }

  </style>

  <!-- Sıralama önemli: önce vurgulayıcı ve veri, sonra uygulama -->
  <script>
/* Hafif, güvenli sözdizimi vurgulayıcı (html/css/js/php). */
const HL = (function () {
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  const JS_KW = new Set(("let const var function return if else for while do switch case break " +
    "continue default new this typeof try catch finally throw true false null undefined of in " +
    "class extends void delete instanceof").split(" "));
  const PHP_KW = new Set(("echo print function return if else elseif for foreach while do switch case " +
    "break continue default as global static const new class public private protected true false null " +
    "array isset empty unset require include var_dump print_r header exit and or").split(" "));

  function hlWords(text, KW) {
    return esc(text).replace(/\b([A-Za-z_]\w*)\b/g, (w) =>
      KW.has(w) ? '<span class="c-kw">' + w + "</span>" : w);
  }

  // js & php
  function hlCode(src, isPhp) {
    const re = /(\/\*[\s\S]*?\*\/|\/\/[^\n]*|#[^\n]*)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`)|(\$[A-Za-z_]\w*)|(\b\d+\.?\d*\b)/g;
    const KW = isPhp ? PHP_KW : JS_KW;
    let out = "", last = 0, m;
    while ((m = re.exec(src))) {
      out += hlWords(src.slice(last, m.index), KW);
      if (m[1]) out += '<span class="c-com">' + esc(m[1]) + "</span>";
      else if (m[2]) out += '<span class="c-str">' + esc(m[2]) + "</span>";
      else if (m[3]) out += '<span class="c-var">' + esc(m[3]) + "</span>";
      else if (m[4]) out += '<span class="c-num">' + esc(m[4]) + "</span>";
      last = re.lastIndex;
    }
    out += hlWords(src.slice(last), KW);
    return out;
  }

  function hlCssText(text) {
    return esc(text).replace(/([a-zA-Z-]+)(\s*:)/g, '<span class="c-prop">$1</span>$2');
  }
  function hlCss(src) {
    const re = /(\/\*[\s\S]*?\*\/)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(#[0-9a-fA-F]{3,8}\b)|(-?\d+\.?\d*(?:px|em|rem|%|vw|vh|fr|s|deg)?\b)|(@[a-z-]+)/g;
    let out = "", last = 0, m;
    while ((m = re.exec(src))) {
      out += hlCssText(src.slice(last, m.index));
      if (m[1]) out += '<span class="c-com">' + esc(m[1]) + "</span>";
      else if (m[2]) out += '<span class="c-str">' + esc(m[2]) + "</span>";
      else if (m[3] || m[4]) out += '<span class="c-num">' + esc(m[3] || m[4]) + "</span>";
      else if (m[5]) out += '<span class="c-kw">' + esc(m[5]) + "</span>";
      last = re.lastIndex;
    }
    out += hlCssText(src.slice(last));
    return out;
  }

  function hlTag(tag) {
    const inner = tag.slice(1, -1);
    let html = esc(inner).replace(
      /([a-zA-Z-]+)=("(?:[^"]*)"|'(?:[^']*)')/g,
      '<span class="c-attr">$1</span>=<span class="c-str">$2</span>'
    );
    html = html.replace(/^(\/?)([a-zA-Z0-9]+)/, '$1<span class="c-tag">$2</span>');
    return '<span class="c-punc">&lt;</span>' + html + '<span class="c-punc">&gt;</span>';
  }
  function hlHtml(src) {
    const re = /(<!--[\s\S]*?-->)|(<\/?[a-zA-Z][^>]*>)/g;
    let out = "", last = 0, m;
    while ((m = re.exec(src))) {
      out += esc(src.slice(last, m.index));
      if (m[1]) out += '<span class="c-com">' + esc(m[1]) + "</span>";
      else out += hlTag(m[2]);
      last = re.lastIndex;
    }
    out += esc(src.slice(last));
    return out;
  }

  return function highlight(code, lang) {
    try {
      if (lang === "html") return hlHtml(code);
      if (lang === "css") return hlCss(code);
      if (lang === "php") return hlCode(code, true);
      if (lang === "js") return hlCode(code, false);
      return esc(code);
    } catch (e) {
      return esc(code);
    }
  };
})();

  </script>

    topics: [

  <script>
/* Web Programlama — Kod Atölyesi : uygulama mantığı */
(function () {
  "use strict";

  var LANG_LABEL = { html: "HTML", css: "CSS", js: "JavaScript", php: "PHP", kavram: "Kavram" };

  var state = { week: COURSE.weeks[0].id, query: "", lang: "all" };
  var runners = {}; // rid -> console panel element

  var $sidebar = document.getElementById("sidebar");
  var $main = document.getElementById("main");
  var $search = document.getElementById("search");
  var $chips = document.getElementById("chips");

  /* ---------- sidebar ---------- */
  function buildSidebar() {
    var html = '<div class="side-title">Haftalar</div>';
    COURSE.weeks.forEach(function (w) {
      var dot = w.langs.map(function (l) {
        return '<i class="dot lang-' + l + '" title="' + (LANG_LABEL[l] || l) + '"></i>';
      }).join("");
      html += '<button class="side-item" data-week="' + w.id + '">' +
        '<span class="side-num">' + w.id + '</span>' +
        '<span class="side-text"><span class="side-name">' + w.title +
        (w.added ? '<span class="badge-added">EKLENDİ</span>' : "") + "</span>" +
        '<span class="side-dots">' + dot + "</span></span></button>";
    });
    $sidebar.innerHTML = html;
    $sidebar.querySelectorAll(".side-item").forEach(function (b) {
      b.addEventListener("click", function () {
        state.week = parseInt(b.dataset.week, 10);
        state.query = ""; $search.value = "";
        render();
      });
    });
  }

  /* ---------- helpers ---------- */
  function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function topicMatches(t) {
    if (state.lang !== "all") {
      var langs = (t.blocks || []).map(function (b) { return b.lang; });
      langs.push(t.lang);
      if (langs.indexOf(state.lang) === -1) return false;
    }
    if (state.query) {
      var q = state.query.toLowerCase();
      var hay = (t.name + " " + (t.note || "") + " " +
        (t.blocks || []).map(function (b) { return b.text; }).join(" ") + " " +
        (t.list || []).map(function (i) { return i.t + " " + i.d; }).join(" ")).toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  }

  var BASE_STYLE =
    "body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:14px;color:#1f2430;" +
    "margin:0;padding:14px;line-height:1.5;}*{box-sizing:border-box;}";

  function shim(rid) {
    return "(function(){var R=" + JSON.stringify(rid) + ";" +
      "function f(a){try{return typeof a==='object'?JSON.stringify(a):String(a);}catch(e){return String(a);}}" +
      "function s(k,args){parent.postMessage({__run:1,rid:R,kind:k,text:[].map.call(args,f).join(' ')},'*');}" +
      "['log','info','warn','error'].forEach(function(k){var o=console[k];console[k]=function(){o&&o.apply(console,arguments);s(k,arguments);};});" +
      "window.alert=function(m){s('alert',[m]);};" +
      "window.addEventListener('error',function(e){s('error',[e.message]);});" +
      "})();";
  }

  function isStructured(htmlText) { return /<head|<html|<!doctype/i.test(htmlText); }

  // Düzenleme/önizleme için temiz kaynak (shim'siz)
  function cleanSource(t) {
    var html = (t.blocks || []).filter(function (b) { return b.lang === "html"; }).map(function (b) { return b.text; }).join("\n");
    var css = (t.blocks || []).filter(function (b) { return b.lang === "css"; }).map(function (b) { return b.text; }).join("\n\n");
    var js = (t.blocks || []).filter(function (b) { return b.lang === "js"; }).map(function (b) { return b.text; }).join("\n\n");
    if (isStructured(html) && !css && !js) return html;
    var doc = '<!DOCTYPE html>\n<html lang="tr">\n<head>\n<meta charset="UTF-8">\n';
    if (css) doc += "<style>\n" + css + "\n</style>\n";
    doc += "</head>\n<body>\n";
    doc += html || (js ? '<p id="demo"></p>' : "");
    if (js) doc += "\n<script>\n" + js + "\n<\/script>";
    doc += "\n</body>\n</html>";
    return doc;
  }

  // Çalıştırılacak belge (shim + base style enjekte edilmiş)
  function runnableDoc(source, rid) {
    var doc = source;
    var styleTag = "<style>" + BASE_STYLE + "</style>";
    var scriptTag = "<script>" + shim(rid) + "<\/script>";
    if (/<\/head>/i.test(doc)) doc = doc.replace(/<\/head>/i, styleTag + "</head>");
    else doc = styleTag + doc;
    if (/<\/body>/i.test(doc)) doc = doc.replace(/<\/body>/i, scriptTag + "</body>");
    else doc = doc + scriptTag;
    return doc;
  }

  /* ---------- topic card ---------- */
  function topicCard(t) {
    var rid = "r" + Math.random().toString(36).slice(2, 9);
    var card = document.createElement("section");
    card.className = "card";

    // header
    var head = document.createElement("div");
    head.className = "card-head";
    head.innerHTML =
      '<h3 class="card-name">' + esc(t.name) +
      (t.research ? '<span class="badge-research">ARAŞTIRMA ÖDEVİ</span>' : "") + "</h3>" +
      '<span class="lang-badge lang-' + t.lang + '">' + (LANG_LABEL[t.lang] || t.lang) + "</span>";
    card.appendChild(head);

    if (t.note) {
      var note = document.createElement("p");
      note.className = "card-note";
      note.textContent = t.note;
      card.appendChild(note);
    }

    // code blocks
    (t.blocks || []).forEach(function (b) {
      var wrap = document.createElement("div");
      wrap.className = "code-wrap";
      var tag = document.createElement("span");
      tag.className = "code-lang lang-" + b.lang;
      tag.textContent = LANG_LABEL[b.lang] || b.lang;
      var copy = document.createElement("button");
      copy.className = "code-copy"; copy.textContent = "kopyala";
      copy.addEventListener("click", function () { copyText(b.text, copy); });
      var pre = document.createElement("pre");
      pre.className = "code";
      pre.innerHTML = "<code>" + HL(b.text, b.lang) + "</code>";
      wrap.appendChild(tag); wrap.appendChild(copy); wrap.appendChild(pre);
      card.appendChild(wrap);
    });

    // terim listesi (kavram kartları)
    if (t.list && t.list.length) {
      var dl = document.createElement("dl");
      dl.className = "term-list";
      t.list.forEach(function (item) {
        var dt = document.createElement("dt"); dt.textContent = item.t;
        var dd = document.createElement("dd"); dd.textContent = item.d;
        dl.appendChild(dt); dl.appendChild(dd);
      });
      card.appendChild(dl);
    }

    // actions + output
    var actions = document.createElement("div");
    actions.className = "card-actions";
    card.appendChild(actions);

    var stage = document.createElement("div");
    stage.className = "stage";
    card.appendChild(stage);

    if (t.run) {
      var runBtn = button("▶ Çalıştır", "btn-run");
      var editBtn = button("✎ Düzenle", "btn-ghost");
      actions.appendChild(runBtn); actions.appendChild(editBtn);

      runBtn.addEventListener("click", function () { runInto(stage, cleanSource(t), rid); });
      editBtn.addEventListener("click", function () { openEditor(stage, t, rid); });
    } else {
      var serverNote = document.createElement("span");
      serverNote.className = "server-note";
      serverNote.textContent = t.lang === "php" ? "PHP — çalıştırmak için sunucu gerekir (Laragon/XAMPP)" : "";
      if (serverNote.textContent) actions.appendChild(serverNote);
      if (t.output) {
        var out = document.createElement("div");
        out.className = "expected";
        out.innerHTML = '<div class="expected-label">Beklenen çıktı</div><pre>' + esc(t.output) + "</pre>";
        stage.appendChild(out);
      }
    }
    return card;
  }

  function button(label, cls) {
    var b = document.createElement("button");
    b.className = "btn " + cls; b.textContent = label; return b;
  }

  function runInto(stage, source, rid) {
    stage.innerHTML = "";
    var bar = document.createElement("div");
    bar.className = "preview-bar"; bar.textContent = "Çıktı";
    var frame = document.createElement("iframe");
    frame.className = "preview";
    frame.setAttribute("sandbox", "allow-scripts");
    frame.setAttribute("title", "önizleme");
    var cons = document.createElement("div");
    cons.className = "console"; cons.style.display = "none";
    runners[rid] = cons;
    stage.appendChild(bar); stage.appendChild(frame); stage.appendChild(cons);
    frame.srcdoc = runnableDoc(source, rid);
  }

  function openEditor(stage, t, rid) {
    stage.innerHTML = "";
    var ta = document.createElement("textarea");
    ta.className = "editor"; ta.value = cleanSource(t);
    ta.rows = Math.min(20, ta.value.split("\n").length + 1);
    var run = button("▶ Çalıştır", "btn-run");
    var result = document.createElement("div");
    result.className = "stage-inner";
    stage.appendChild(ta);
    var row = document.createElement("div"); row.className = "editor-row";
    row.appendChild(run); stage.appendChild(row);
    stage.appendChild(result);
    run.addEventListener("click", function () { runInto(result, ta.value, rid); });
    runInto(result, ta.value, rid);
  }

  function copyText(text, btn) {
    var done = function () { var o = btn.textContent; btn.textContent = "kopyalandı ✓"; setTimeout(function () { btn.textContent = o; }, 1200); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function () { fallback(text, done); });
    } else fallback(text, done);
  }
  function fallback(text, done) {
    var ta = document.createElement("textarea"); ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta);
    ta.select(); try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta); done();
  }

  /* ---------- console messages ---------- */
  window.addEventListener("message", function (e) {
    var d = e.data;
    if (!d || !d.__run || !runners[d.rid]) return;
    var cons = runners[d.rid];
    cons.style.display = "block";
    var line = document.createElement("div");
    line.className = "c-line c-" + d.kind;
    line.textContent = (d.kind === "alert" ? "⚠ " : d.kind === "error" ? "✖ " : "› ") + d.text;
    cons.appendChild(line);
  });

  /* ---------- render ---------- */
  function render() {
    // chips active
    $chips.querySelectorAll(".chip").forEach(function (c) {
      c.classList.toggle("active", c.dataset.lang === state.lang);
    });
    $sidebar.querySelectorAll(".side-item").forEach(function (b) {
      b.classList.toggle("active", !state.query && parseInt(b.dataset.week, 10) === state.week);
    });

    $main.innerHTML = "";
    var filtering = state.query || state.lang !== "all";

    if (filtering) {
      var results = [];
      COURSE.weeks.forEach(function (w) {
        (w.topics || []).forEach(function (t) { if (topicMatches(t)) results.push({ w: w, t: t }); });
      });
      var h = document.createElement("div");
      h.className = "week-head-block";
      h.innerHTML = "<h2>Sonuçlar</h2><p class='week-sum'>" + results.length +
        " konu bulundu" + (state.query ? ' · "' + esc(state.query) + '"' : "") +
        (state.lang !== "all" ? " · " + LANG_LABEL[state.lang] : "") + "</p>";
      $main.appendChild(h);
      if (!results.length) {
        var none = document.createElement("p"); none.className = "empty";
        none.textContent = "Eşleşen konu yok. Aramayı veya filtreyi değiştir.";
        $main.appendChild(none);
      }
      results.forEach(function (r) {
        var tag = document.createElement("div"); tag.className = "result-week";
        tag.textContent = "Hafta " + r.w.id + " — " + r.w.title;
        $main.appendChild(tag);
        $main.appendChild(topicCard(r.t));
      });
    } else {
      var w = COURSE.weeks.filter(function (x) { return x.id === state.week; })[0];
      var head = document.createElement("div");
      head.className = "week-head-block" + (w.added ? " added" : "");
      head.innerHTML =
        '<div class="week-eyebrow">Hafta ' + w.id + (w.added ? '<span class="badge-added">EKLENDİ</span>' : "") + "</div>" +
        "<h2>" + esc(w.title) + "</h2>" +
        '<p class="week-sum">' + esc(w.summary || "") + "</p>" +
        '<p class="disclaimer">Lütfen yanlış, eksik ve fazla bilgiler olabileceğini unutmayınız.</p>';
      $main.appendChild(head);
      if (w.added) {
        var nb = document.createElement("div");
        nb.className = "note-banner";
        nb.textContent = "Bu hafta orijinal ders dosyalarında eksikti. Ders planındaki CSS konusuna göre eklenmiştir.";
        $main.appendChild(nb);
      }
      (w.topics || []).forEach(function (t) { $main.appendChild(topicCard(t)); });
    }
    $main.scrollTop = 0;
  }

  /* ---------- chips & search ---------- */
  function buildChips() {
    var langs = [["all", "Tümü"], ["html", "HTML"], ["css", "CSS"], ["js", "JavaScript"], ["php", "PHP"]];
    $chips.innerHTML = langs.map(function (l) {
      return '<button class="chip lang-pill-' + l[0] + '" data-lang="' + l[0] + '">' + l[1] + "</button>";
    }).join("");
    $chips.querySelectorAll(".chip").forEach(function (c) {
      c.addEventListener("click", function () { state.lang = c.dataset.lang; render(); });
    });
  }
  var t;
  $search.addEventListener("input", function () {
    clearTimeout(t);
    t = setTimeout(function () { state.query = $search.value.trim(); render(); }, 120);
  });

  /* ---------- init ---------- */
  document.getElementById("app-title").textContent = COURSE.meta.title;
  document.getElementById("app-sub").textContent = COURSE.meta.subtitle;
  buildSidebar();
  buildChips();
  render();

  /* tema geçişi */
  var $theme = document.getElementById("theme-toggle");
  function refreshThemeIcon() {
    var dark = document.documentElement.getAttribute("data-theme") === "dark";
    $theme.textContent = dark ? "☀" : "☾";
    $theme.title = dark ? "Açık moda geç" : "Koyu moda geç";
  }
  refreshThemeIcon();
  $theme.addEventListener("click", function () {
    var dark = document.documentElement.getAttribute("data-theme") === "dark";
    var next = dark ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("wp-theme", next); } catch (e) {}
    refreshThemeIcon();
  });

  /* tam ekran */
  var $fs = document.getElementById("fs-toggle");
  function fsElement() { return document.fullscreenElement || document.webkitFullscreenElement; }
  function refreshFsIcon() {
    var on = !!fsElement();
    $fs.textContent = on ? "✕" : "⛶";
    $fs.title = on ? "Tam ekrandan çık" : "Tam ekran";
  }
  $fs.addEventListener("click", function () {
    try {
      if (!fsElement()) {
        var el = document.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) req.call(el);
      } else {
        var exit = document.exitFullscreen || document.webkitExitFullscreen;
        if (exit) exit.call(document);
      }
    } catch (e) {}
  });
  document.addEventListener("fullscreenchange", refreshFsIcon);
  document.addEventListener("webkitfullscreenchange", refreshFsIcon);
  refreshFsIcon();
})();

  </script>
</body>
</html>
