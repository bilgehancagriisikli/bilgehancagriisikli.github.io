<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim ilk websitem</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; }
        
        .calculator-container {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
            /* Alt alta gelmesi için block yapıp margin ile ortaladık */
            display: block; 
            margin: 30px auto; 
            width: 300px;
            color: white;
        }

        input { 
            width: 100%; 
            height: 45px; 
            font-size: 22px; 
            text-align: right; 
            margin-bottom: 15px; 
            border-radius: 5px; 
            border: none; 
            padding: 5px; 
            box-sizing: border-box;
            background: #ecf0f1;
        }
        
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        button { padding: 12px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }

        .num { background: #7f8c8d; color: white; }
        .op { background: #f39c12; color: white; }
        .bin { background: #3498db; color: white; }
        .clear { background: #e74c3c; color: white; }
        .equal { background: #27ae60; color: white; }
        .convert { background: #9b59b6; color: white; margin-bottom: 5px; }

        .image-gallery img { margin: 5px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>Merhaba Dünya!</h1>
    <p>Ben Bilgehan Çağrı Işıklı. Websiteme Hoşgeldiniz.</p>

    <div class="image-gallery">
        <img src="chinchilla-ninja.gif" alt="Chinchilla" width="150">
        <img src="hamster-eating-carrots.gif" alt="Hamster" width="150">
        <img src="rubix-cube.gif" alt="Rubix" width="150">
        <img src="lego-logo.gif" alt="Lego" width="150">
    </div>

    <hr style="width: 50%; margin: 40px auto; border: 0.5px solid #ccc;">

    <div class="calculator-container">
        <h3>Normal (10'luk) Hesap Makinesi</h3>
        <input type="text" id="display" disabled value="0">
        <div class="buttons">
            <button class="clear" style="grid-column: span 2;" onclick="temizle()">Temizle</button>
            <button class="op" onclick="ekle('/')">/</button>
            <button class="op" onclick="ekle('*')">x</button>
            <button class="num" onclick="ekle('7')">7</button>
            <button class="num" onclick="ekle('8')">8</button>
            <button class="num" onclick="ekle('9')">9</button>
            <button class="op" onclick="ekle('-')">-</button>
            <button class="num" onclick="ekle('4')">4</button>
            <button class="num" onclick="ekle('5')">5</button>
            <button class="num" onclick="ekle('6')">6</button>
            <button class="op" onclick="ekle('+')">+</button>
            <button class="num" onclick="ekle('1')">1</button>
            <button class="num" onclick="ekle('2')">2</button>
            <button class="num" onclick="ekle('3')">3</button>
            <button class="equal" style="grid-row: span 2; height: 100%;" onclick="hesapla()">=</button>
            <button class="num" style="grid-column: span 3;" onclick="ekle('0')">0</button>
        </div>
    </div>

    <div class="calculator-container" style="background-color: #1a252f;">
        <h3>2'lik Sistem (Binary) Hesap Makinesi</h3>
        <input type="text" id="binDisplay" disabled value="0">
        <div class="buttons">
            <button class="bin" style="grid-column: span 2;" onclick="binEkle('1')">1</button>
            <button class="bin" style="grid-column: span 2;" onclick="binEkle('0')">0</button>
            <button class="op" onclick="binEkle('+')">+</button>
            <button class="op" onclick="binEkle('-')">-</button>
            <button class="op" onclick="binEkle('*')">x</button>
            <button class="op" onclick="binEkle('/')">/</button>
            <button class="clear" style="grid-column: span 2;" onclick="binTemizle()">Temizle</button>
            <button class="equal" style="grid-column: span 2;" onclick="binHesapla()">=</button>
        </div>
    </div>

    <div class="calculator-container" style="background-color: #d35400;">
        <h3>8'lik Sistem (Octal) Hesap Makinesi</h3>
        <input type="text" id="octDisplay" disabled value="0">
        <div class="buttons">
            <button class="num" onclick="octEkle('7')">7</button>
            <button class="num" onclick="octEkle('6')">6</button>
            <button class="num" onclick="octEkle('5')">5</button>
            <button class="op" onclick="octEkle('/')">/</button>
            
            <button class="num" onclick="octEkle('4')">4</button>
            <button class="num" onclick="octEkle('3')">3</button>
            <button class="num" onclick="octEkle('2')">2</button>
            <button class="op" onclick="octEkle('*')">x</button>
            
            <button class="num" onclick="octEkle('1')">1</button>
            <button class="num" onclick="octEkle('0')">0</button>
            <button class="clear" onclick="octTemizle()">C</button>
            <button class="op" onclick="octEkle('-')">-</button>
            
            <button class="equal" style="grid-column: span 3;" onclick="octHesapla()">=</button>
            <button class="op" onclick="octEkle('+')">+</button>
        </div>
    </div>


<div class="calculator-container" style="background-color: #6c5ce7;">
    <h3>16'lık Sistem (Hex) Hesap Makinesi</h3>
    <input type="text" id="hexDisplay" disabled value="0">
    <div class="buttons">
        <button class="num" style="background: #a29bfe;" onclick="hexEkle('A')">A(10)</button>
        <button class="num" style="background: #a29bfe;" onclick="hexEkle('B')">B(11)</button>
        <button class="num" style="background: #a29bfe;" onclick="hexEkle('C')">C(12)</button>
        <button class="op" onclick="hexEkle('/')">/</button>

        <button class="num" style="background: #a29bfe;" onclick="hexEkle('D')">D(13)</button>
        <button class="num" style="background: #a29bfe;" onclick="hexEkle('E')">E(14)</button>
        <button class="num" style="background: #a29bfe;" onclick="hexEkle('F')">F(15)</button>
        <button class="op" onclick="hexEkle('*')">x</button>

        <button class="num" onclick="hexEkle('7')">7</button>
        <button class="num" onclick="hexEkle('8')">8</button>
        <button class="num" onclick="hexEkle('9')">9</button>
        <button class="op" onclick="hexEkle('-')">-</button>

        <button class="num" onclick="hexEkle('4')">4</button>
        <button class="num" onclick="hexEkle('5')">5</button>
        <button class="num" onclick="hexEkle('6')">6</button>
        <button class="op" onclick="hexEkle('+')">+</button>

        <button class="num" onclick="hexEkle('1')">1</button>
        <button class="num" onclick="hexEkle('2')">2</button>
        <button class="num" onclick="hexEkle('3')">3</button>
        <button class="clear" onclick="hexTemizle()">C</button>

        <button class="num" style="grid-column: span 2;" onclick="hexEkle('0')">0</button>
        <button class="equal" style="grid-column: span 2;" onclick="hexHesapla()">=</button>
    </div>
</div>

    

    <div class="calculator-container" style="background-color: #273c75;">
        <h3>Taban Dönüştürücü&#128260;</h3>
        <input type="text" id="convDisplay" placeholder="Sayı giriniz...">
        <div class="buttons" style="grid-template-columns: 1fr;">
            <button class="convert" onclick="toBinary()">10'luk (Decimal) &#10142; 2'lik (Binary)</button>
            <button class="convert" onclick="toDecimal()">2'lik (Binary) &#10142; 10'luk (Decimal)</button>
            <button class="convert" onclick="hexToBinary()">16'lık (Hex) &#10142; 2'lik (Binary)</button>
            <button class="convert" onclick="binToHex()">2'lik (Binary) &#10142; 16'lık (Hex)</button>
            <button class="convert" onclick="toOctal()">10'luk (Decimal) &#10142; 8'lik (Octal)</button>
            <button class="convert" onclick="octToDecimal()">8'lik (Octal) &#10142; 10'luk (Decimal)</button>
            <button class="convert" onclick="binToOct()">2'lik (Binary) -> &#10142; (Octal)</button>
            <button class="convert" onclick="octToBin()">8'lik (Octal) -> &#10142; (Binary)</button>
            
            <button class="clear" onclick="convTemizle()">Temizle&#128465;</button>
        </div>
        <p id="convResult" style="margin-top:15px; font-weight:bold; color:#fbc531; min-height: 20px;"></p>
    </div>



    
    
    <script>
        // Standart Hesaplama
        function ekle(v) { 
            let d = document.getElementById('display');
            if(d.value === "0") d.value = v; else d.value += v; 
        }
        function temizle() { document.getElementById('display').value = "0"; }
        function hesapla() { 
            try { document.getElementById('display').value = eval(document.getElementById('display').value); } 
            catch { document.getElementById('display').value = "Hata"; }
        }

        // Binary İşlemler
        function binEkle(v) {
            let d = document.getElementById('binDisplay');
            if(d.value === "0") d.value = v; else d.value += v;
        }
        function binTemizle() { document.getElementById('binDisplay').value = "0"; }
        function binHesapla() {
            try {
                let exp = document.getElementById('binDisplay').value;
                let result = eval(exp.replace(/[01]+/g, (n) => parseInt(n, 2)));
                document.getElementById('binDisplay').value = Math.floor(result).toString(2);
            } catch { document.getElementById('binDisplay').value = "Hata"; }
        }

        // Dönüştürücü
        function convTemizle() {
            document.getElementById('convDisplay').value = "";
            document.getElementById('convResult').innerText = "";
        }
        function toBinary() {
              let val = document.getElementById('convDisplay').value.trim();
         // Sadece rakamlardan oluşup oluşmadığını kontrol eder
              if (!/^\d+$/.test(val)) {
            document.getElementById('convResult').innerText = "Hata: Lütfen sadece rakam (0-9) girin!";
               return;
    }
            let num = parseInt(val, 10);
            document.getElementById('convResult').innerText = "2'lik (Binary) sonucu: " + num.toString(2);
}
        function toDecimal() {
            let val = document.getElementById('convDisplay').value;
            if (!/^[01]+$/.test(val)) {
                document.getElementById('convResult').innerText = "Sadece 0 ve 1 girin!";
                return;
            }
            document.getElementById('convResult').innerText = "10'luk (Decimal) sisteme göre: " + parseInt(val, 2);
        }

        function hexToBinary() {
    let val = document.getElementById('convDisplay').value.trim();
    // 16'lık sistem kontrolü (0-9 ve A-F)
    if (!/^[0-9A-Fa-f]+$/.test(val)) {
        document.getElementById('convResult').innerText = "Geçersiz Hexadecimal!";
        return;
    }
    let decimal = parseInt(val, 16);
    document.getElementById('convResult').innerText = "2'lik(Binary) sonucu: " + decimal.toString(2);
}

function binToHex() {
    let val = document.getElementById('convDisplay').value.trim();
    // Sadece 0 ve 1 kontrolü
    if (!/^[01]+$/.test(val)) {
        document.getElementById('convResult').innerText = "Sadece 0 ve 1 girin!";
        return;
    }
    let decimal = parseInt(val, 2);
    // toUpperCase() ile harflerin büyük (A, B, C...) görünmesini sağlıyoruz
    document.getElementById('convResult').innerText = "16'lık(Hex) sonucu: " + decimal.toString(16).toUpperCase();
}
// 10'luk -> 8'lik (Octal)
function toOctal() {
    let val = document.getElementById('convDisplay').value.trim();
    if (!/^\d+$/.test(val)) {
        document.getElementById('convResult').innerText = "Hata: Sadece rakam girin!";
        return;
    }
    let num = parseInt(val, 10);
    document.getElementById('convResult').innerText = "8'lik (Octal) sonucu: " + num.toString(8);
}

// 8'lik (Octal) -> 10'luk
function octToDecimal() {
    let val = document.getElementById('convDisplay').value.trim();
    // 8'lik sistemde sadece 0-7 arası rakamlar olabilir
    if (!/^[0-7]+$/.test(val)) {
        document.getElementById('convResult').innerText = "Hata: Sadece 0-7 arası rakam girin!";
        return;
    }
    let num = parseInt(val, 8);
    document.getElementById('convResult').innerText = "10'luk (Decimal) sonucu: " + num;
}

// 2'lik (Binary) -> 8'lik (Octal)
function binToOct() {
    let val = document.getElementById('convDisplay').value.trim();
    if (!/^[01]+$/.test(val)) {
        document.getElementById('convResult').innerText = "Hata: Sadece 0 ve 1 girin!";
        return;
    }
    let decimal = parseInt(val, 2);
    document.getElementById('convResult').innerText = "8'lik (Octal) sonucu: " + decimal.toString(8);
}

// 8'lik (Octal) -> 2'lik (Binary)
function octToBin() {
    let val = document.getElementById('convDisplay').value.trim();
    if (!/^[0-7]+$/.test(val)) {
        document.getElementById('convResult').innerText = "Hata: Sadece 0-7 arası rakam girin!";
        return;
    }
    let decimal = parseInt(val, 8);
    document.getElementById('convResult').innerText = "2'lik (Binary) sonucu: " + decimal.toString(2);
}


// Octal (8'lik) İşlemler
        function octEkle(v) {
            let d = document.getElementById('octDisplay');
            if(d.value === "0") d.value = v; else d.value += v;
        }

        function octTemizle() { 
            document.getElementById('octDisplay').value = "0"; 
        }

        function octHesapla() {
            try {
                let exp = document.getElementById('octDisplay').value;
                // Düzenli ifade ile sayıları bulup 8'lik tabandan 10'luk tabana çeviriyoruz
                let result = eval(exp.replace(/[0-7]+/g, (n) => parseInt(n, 8)));
                // Sonucu tekrar 8'lik tabana çevirip yazdırıyoruz
                // Math.floor kullanarak tam sayı bölmesini garantiliyoruz
                document.getElementById('octDisplay').value = Math.floor(result).toString(8);
            } catch { 
                document.getElementById('octDisplay').value = "Hata"; 
            }
        }

// Hexadecimal (16'lık) İşlemler
function hexEkle(v) {
    let d = document.getElementById('hexDisplay');
    if(d.value === "0") d.value = v; else d.value += v;
}

function hexTemizle() { 
    document.getElementById('hexDisplay').value = "0"; 
}

function hexHesapla() {
    try {
        let exp = document.getElementById('hexDisplay').value;
        // Regex ile 0-9 ve A-F arasındaki tüm Hex sayıları bulup 10'luk sisteme çeviriyoruz
        let result = eval(exp.replace(/[0-9A-Fa-f]+/g, (n) => parseInt(n, 16)));
        // Sonucu tekrar 16'lığa çevirip büyük harf yapıyoruz
        document.getElementById('hexDisplay').value = Math.floor(result).toString(16).toUpperCase();
    } catch { 
        document.getElementById('hexDisplay').value = "Hata"; 
    }
}


        
    </script>

</body>
</html>
